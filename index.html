<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Bouquet Builder</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fffafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            text-align: center;
        }

        header { margin-top: 30px; }
        h1 { color: #d63384; font-weight: 300; }
        .counter { color: #888; margin-bottom: 10px; }

        /* The Bouquet Area */
        #bouquet-container {
            width: 90%;
            max-width: 500px;
            height: 450px;
            margin: 20px auto;
            position: relative;
            background: white;
            border-radius: 30px;
            border: 2px solid #ffdae0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* The Vase */
        .vase {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            z-index: 10; /* Vase stays in front of flower stems */
            pointer-events: none;
        }

        /* Collected Flowers */
        .collected-flower {
            width: 130px;
            position: absolute;
            animation: dropIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 5; /* Behind the vase front */
        }

        @keyframes dropIn {
            0% { transform: translateY(-100px) scale(0); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Selection Shelf */
        .garden-shelf {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .sticker-wrapper { cursor: pointer; transition: 0.3s; }
        .sticker-wrapper:hover { transform: scale(1.1); }
        .flower-asset { width: 70px; height: 70px; object-fit: contain; }

        /* Wish Modal */
        #wish-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>Happy Birthday!</h1>
        <p>Click the flowers to build your bouquet</p>
        <div class="counter" id="count-label">Flowers: 0 / 5</div>
    </header>

    <div id="bouquet-container">
        <img src="https://img.icons8.com/isometric/200/vase.png" class="vase" alt="vase">
        <div id="empty-hint" style="margin-top: 150px; color: #ddd;">Click a flower below...</div>
    </div>

    <div class="garden-shelf">
        <div class="sticker-wrapper" onclick="collectFlower('flower1.png')">
            <img src="flower1.png" class="flower-asset">
        </div>
        <div class="sticker-wrapper" onclick="collectFlower('flower2.png')">
            <img src="flower2.png" class="flower-asset">
        </div>
        <div class="sticker-wrapper" onclick="collectFlower('flower3.png')">
            <img src="flower3.png" class="flower-asset">
        </div>
        <div class="sticker-wrapper" onclick="collectFlower('flower4.png')">
            <img src="flower4.png" class="flower-asset">
        </div>
    </div>

    <div id="wish-modal">
        <h2 style="font-size: 2.5rem; color: #d63384;">Happy Birthday! ✨</h2>
        <p style="font-size: 1.2rem; max-width: 80%;">Your beautiful bouquet is complete, just like my life with you.</p>
        <button onclick="closeWish()" style="padding: 10px 20px; border-radius: 20px; border: 1px solid #ffb7c5; background: white; cursor: pointer;">View Bouquet</button>
    </div>

    <script>
        let count = 0;
        const totalNeeded = 5;

        function collectFlower(imgSrc) {
            if (count === 0) document.getElementById('empty-hint').style.display = 'none';
            
            count++;
            document.getElementById('count-label').innerText = `Flowers: ${count} / ${totalNeeded}`;

            const container = document.getElementById('bouquet-container');
            const img = document.createElement('img');
            img.src = imgSrc;
            img.className = 'collected-flower';

            // Position flowers specifically to look like they are in the vase
            // Spread them slightly left and right, but keep them centered
            const randomX = Math.floor(Math.random() * 150) + (container.offsetWidth / 2 - 100);
            const randomY = Math.floor(Math.random() * 100) + 50; // Keep them in the top half
            const randomRot = Math.floor(Math.random() * 60) - 30;

            img.style.left = randomX + 'px';
            img.style.top = randomY + 'px';
            img.style.transform = `rotate(${randomRot}deg)`;

            container.appendChild(img);

            if (count === totalNeeded) {
                setTimeout(() => { document.getElementById('wish-modal').style.display = 'flex'; }, 1000);
            }
        }

        function closeWish() { document.getElementById('wish-modal').style.display = 'none'; }
    </script>
</body>
</html>
